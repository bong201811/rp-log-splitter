<body>

    <h1>📄 RP 로그 스플리터</h1>
    <div class="sub">🧹 OOC 제거 + 턴 검색 + 범위 추출</div>

    <!-- 업로드 -->
    <div class="card">
        <div class="upload-area" id="uploadArea">
            <label for="fileInput" style="display:block;cursor:pointer;padding:10px;">
                <div>📂 파일을 선택하세요</div>
                <div style="font-size:13px;color:#94a3b8;margin-top:6px;">TXT / JSON</div>
            </label>
            <input type="file" id="fileInput" accept=".txt,.json" />
        </div>
        <div class="file-name" id="fileName"></div>
        <div class="flex-row">
            <label><input type="checkbox" id="cleanNoise" checked /> 🧹 노이즈 제거</label>
            <label><input type="checkbox" id="cleanOOC" checked /> 🗑️ OOC 메타 제거</label>
        </div>
        <div class="stats" id="stats">
            <div>원본 <div class="num" id="origLen">0</div></div>
            <div>정리 후 <div class="num" id="cleanLen">0</div></div>
            <div>제거됨 <div class="num" id="removedLen">0</div></div>
        </div>
        <button class="btn btn-primary" id="applyCleanBtn" style="width:100%;margin-top:12px;justify-content:center;">✨ 정리 적용하기</button>
    </div>

    <!-- 검색 & 뷰어 -->
    <div class="card" style="flex:1;">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder='🔍 검색 (예: t30, 40턴, "OOC")' />
            <button class="btn" id="searchPrevBtn">◀</button>
            <button class="btn" id="searchNextBtn">▶</button>
            <button class="btn btn-outline" id="searchClearBtn">✕</button>
        </div>
        <div style="font-size:13px;color:#64748b;margin-bottom:6px;">
            <span id="searchResultInfo">검색 결과: 0개</span>
        </div>
        <div class="viewer" id="textViewer">
            <span style="color:#94a3b8;">📄 파일을 업로드하면 내용이 표시됩니다.</span>
        </div>
    </div>

    <!-- 하단 고정 바 -->
    <div class="bottom-bar">
        <div class="row">
            <button class="btn btn-primary" id="markStartBtn">🔵 시작</button>
            <button class="btn btn-danger" id="markEndBtn">🔴 끝</button>
            <button class="btn btn-warning" id="resetMarkersBtn">↺ 초기화</button>
        </div>
        <div class="row">
            <button class="btn btn-success" id="extractBtn" style="flex:2;">✂️ 추출하기</button>
        </div>
        <div style="font-size:12px;color:#94a3b8;text-align:center;">
            시작: <span id="startInfo">없음</span> &nbsp;|&nbsp; 끝: <span id="endInfo">없음</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ===== 상태 =====
            let rawText = '';
            let cleanedText = '';
            let displayText = '';
            let markers = { start: null, end: null };
            let searchResults = [];
            let searchIdx = 0;

            // DOM refs
            const fileInput = document.getElementById('fileInput');
            const uploadArea = document.getElementById('uploadArea');
            const fileName = document.getElementById('fileName');
            const viewer = document.getElementById('textViewer');
            const origLen = document.getElementById('origLen');
            const cleanLen = document.getElementById('cleanLen');
            const removedLen = document.getElementById('removedLen');
            const searchInput = document.getElementById('searchInput');
            const searchPrevBtn = document.getElementById('searchPrevBtn');
            const searchNextBtn = document.getElementById('searchNextBtn');
            const searchClearBtn = document.getElementById('searchClearBtn');
            const searchResultInfo = document.getElementById('searchResultInfo');
            const markStartBtn = document.getElementById('markStartBtn');
            const markEndBtn = document.getElementById('markEndBtn');
            const resetMarkersBtn = document.getElementById('resetMarkersBtn');
            const extractBtn = document.getElementById('extractBtn');
            const applyCleanBtn = document.getElementById('applyCleanBtn');
            const startInfo = document.getElementById('startInfo');
            const endInfo = document.getElementById('endInfo');
            const toast = document.getElementById('toast');

            // 체크박스
            const cleanNoise = document.getElementById('cleanNoise');
            const cleanOOC = document.getElementById('cleanOOC');

            // ===== 유틸 =====
            function showToast(msg, duration = 2000) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._hide);
                toast._hide = setTimeout(() => toast.classList.remove('show'), duration);
            }

            // ===== 정리 함수 =====
            function cleanText(text) {
                let t = text;
                if (cleanNoise.checked) {
                    // URL 제거
                    t = t.replace(/https?:\/\/[^\s]+/g, '');
                    // 마크다운 이미지
                    t = t.replace(/!\[.*?\]\(.*?\)/g, '');
                    // 일반 이미지 태그
                    t = t.replace(/<img[^>]*>/g, '');
                    // 주석 (// 한줄)
                    t = t.replace(/\/\/.*$/gm, '');
                }
                if (cleanOOC.checked) {
                    // OOC 헤더
                    t = t.replace(/\*\*OOC:.*?\*\*/g, '');
                    // 대괄호 블록 (여러 줄)
                    t = t.replace(/\[[^\]]*\][\s\S]*?(?=\n\[|\n\*\*|$)/g, '');
                    // 슬래시 설명 제거
                    t = t.replace(/\/\s*[^\/\n]*(?:\/\s*[^\/\n]*)*/g, '');
                    // 파이프 태그
                    t = t.replace(/\|[^\|\n]*/g, '');
                    // Call: 라인
                    t = t.replace(/Call:.*$/gm, '');
                }
                // 연속 줄바꿈 정리
                t = t.replace(/\n{3,}/g, '\n\n');
                return t.trim();
            }

            // ===== 렌더링 =====
            function render(text, highlightIdx = null) {
                if (!text) {
                    viewer.innerHTML = '<span style="color:#94a3b8;">📄 내용이 없습니다.</span>';
                    return;
                }
                let html = escapeHtml(text);
                // 검색 하이라이트
                if (searchResults.length > 0 && highlightIdx !== null && highlightIdx >= 0 && highlightIdx < searchResults
                    .length) {
                    const keyword = searchInput.value.trim();
                    if (keyword) {
                        const regex = new RegExp(escapeRegex(keyword), 'gi');
                        html = html.replace(regex, match => `<span class="highlight-search">${match}</span>`);
                    }
                }
                viewer.innerHTML = html;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function escapeRegex(str) {
                return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            // ===== 파일 읽기 =====
            function handleFile(file) {
                if (!file) return;
                fileName.textContent = `📎 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
                const reader = new FileReader();
                reader.onload = function(e) {
                    rawText = e.target.result;
                    applyClean();
                };
                reader.readAsText(file);
            }

            function applyClean() {
                if (!rawText) return;
                cleanedText = cleanText(rawText);
                displayText = cleanedText;
                updateStats();
                render(displayText);
                resetMarkers();
                searchResults = [];
                searchIdx = 0;
                updateSearchInfo();
                showToast('✅ 정리 완료!');
            }

            function updateStats() {
                const orig = rawText ? rawText.length : 0;
                const clean = cleanedText ? cleanedText.length : 0;
                origLen.textContent = orig.toLocaleString();
                cleanLen.textContent = clean.toLocaleString();
                removedLen.textContent = (orig - clean).toLocaleString();
            }

            // ===== 검색 =====
            function doSearch() {
                const keyword = searchInput.value.trim();
                if (!keyword || !displayText) {
                    searchResults = [];
                    searchIdx = 0;
                    updateSearchInfo();
                    render(displayText);
                    return;
                }
                const regex = new RegExp(escapeRegex(keyword), 'gi');
                const matches = [...displayText.matchAll(regex)];
                searchResults = matches.map(m => m.index);
                searchIdx = 0;
                updateSearchInfo();
                if (searchResults.length > 0) {
                    jumpToSearch(0);
                } else {
                    render(displayText);
                    showToast('🔍 검색 결과가 없습니다.');
                }
            }

            function jumpToSearch(idx) {
                if (!searchResults.length) return;
                if (idx < 0) idx = 0;
                if (idx >= searchResults.length) idx = searchResults.length - 1;
                searchIdx = idx;
                const pos = searchResults[idx];
                // 대략적인 위치로 스크롤 (viewer의 스크롤)
                const viewerEl = viewer;
                const text = displayText;
                // 문자 인덱스로 비율 계산
                const ratio = pos / text.length;
                viewerEl.scrollTop = ratio * (viewerEl.scrollHeight - viewerEl.clientHeight);
                // 렌더링
                render(displayText, idx);
                updateSearchInfo();
                showToast(`🔍 ${idx+1}/${searchResults.length} 번째 검색 결과`);
            }

            function updateSearchInfo() {
                const total = searchResults.length;
                const cur = total > 0 ? searchIdx + 1 : 0;
                searchResultInfo.textContent = `검색 결과: ${total}개${total > 0 ? ` (${cur}/${total})` : ''}`;
            }

            // ===== 마커 =====
            function setMarker(type) {
                if (!displayText) {
                    showToast('⚠️ 텍스트가 없습니다.');
                    return;
                }
                // 현재 스크롤 위치 기준으로 대략적인 문자 인덱스 계산
                const viewerEl = viewer;
                const ratio = viewerEl.scrollTop / (viewerEl.scrollHeight - viewerEl.clientHeight || 1);
                const idx = Math.floor(ratio * displayText.length);
                markers[type] = Math.min(Math.max(idx, 0), displayText.length - 1);
                updateMarkerInfo();
                render(displayText);
                showToast(`✅ ${type === 'start' ? '시작' : '끝'} 마커 설정됨 (약 ${Math.floor(idx/displayText.length*100)}%)`);
            }

            function resetMarkers() {
                markers = { start: null, end: null };
                updateMarkerInfo();
                render(displayText);
            }

            function updateMarkerInfo() {
                startInfo.textContent = markers.start !== null ? `📍 ${markers.start}` : '없음';
                endInfo.textContent = markers.end !== null ? `📍 ${markers.end}` : '없음';
            }

            // ===== 추출 =====
            function extractRange() {
                if (markers.start === null || markers.end === null) {
                    showToast('⚠️ 시작과 끝 마커를 먼저 설정해주세요.');
                    return;
                }
                if (!displayText) {
                    showToast('⚠️ 텍스트가 없습니다.');
                    return;
                }
                const s = Math.min(markers.start, markers.end);
                const e = Math.max(markers.start, markers.end);
                const extracted = displayText.slice(s, e);
                if (!extracted.trim()) {
                    showToast('⚠️ 선택한 범위가 비어있습니다.');
                    return;
                }
                // 다운로드
                const blob = new Blob([extracted], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const fname = `extracted_${s}-${e}.txt`;
                a.download = fname;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast(`✅ ${fname} 다운로드 완료! (${(extracted.length/1024).toFixed(1)} KB)`);
            }

            // ===== 이벤트 바인딩 =====
            // 파일 업로드 (수정된 부분: label과 input 연결)
            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    handleFile(this.files[0]);
                }
                this.value = ''; // 같은 파일 다시 선택 가능하게
            });

            // 드래그 앤 드롭 지원
            uploadArea.addEventListener('dragover', (e) => { e.preventDefault();
                uploadArea.classList.add('dragover'); });
            uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
            });

            // 정리 적용
            applyCleanBtn.addEventListener('click', applyClean);

            // 검색
            searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
            searchPrevBtn.addEventListener('click', () => {
                if (searchResults.length) jumpToSearch(searchIdx - 1);
            });
            searchNextBtn.addEventListener('click', () => {
                if (searchResults.length) jumpToSearch(searchIdx + 1);
            });
            searchClearBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchResults = [];
                searchIdx = 0;
                updateSearchInfo();
                render(displayText);
            });

            // 마커
            markStartBtn.addEventListener('click', () => setMarker('start'));
            markEndBtn.addEventListener('click', () => setMarker('end'));
            resetMarkersBtn.addEventListener('click', resetMarkers);

            // 추출
            extractBtn.addEventListener('click', extractRange);

            // 초기화
            resetMarkers();
            updateStats();

            // 추가: 체크박스 변경 시 자동 적용
            cleanNoise.addEventListener('change', applyClean);
            cleanOOC.addEventListener('change', applyClean);

            console.log('✅ RP 로그 스플리터 로드 완료!');
        })();
    </script>
</body>
</html>
