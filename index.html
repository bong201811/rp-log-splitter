<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP 로그 스플리터</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
}
body {
font-family: system-ui, sans-serif;
background: #f5f7fa;
padding: 16px;
padding-bottom: 140px;
}
.card {
background: white;
border-radius: 16px;
padding: 20px;
margin-bottom: 16px;
box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
border: 1px solid #e9edf2;
}
.upload-area {
border: 2px dashed #cbd5e1;
border-radius: 12px;
padding: 32px 16px;
text-align: center;
cursor: pointer;
background: #fafbfc;
transition: 0.2s;
}
.upload-area:active {
background: #eef2f6;
}
.upload-area input {
display: none;
}
.btn {
background: #eef2f6;
border: none;
padding: 12px 20px;
border-radius: 40px;
font-size: 15px;
font-weight: 600;
cursor: pointer;
transition: 0.15s;
touch-action: manipulation;
}
.btn:active {
transform: scale(0.95);
}
.btn-primary {
background: #3b82f6;
color: white;
}
.btn-success {
background: #22c55e;
color: white;
}
.btn-danger {
background: #ef4444;
color: white;
}
.btn-warning {
background: #f59e0b;
color: white;
}
.viewer {
background: #f8fafc;
border-radius: 12px;
padding: 16px;
max-height: 350px;
overflow-y: auto;
white-space: pre-wrap;
font-size: 14px;
line-height: 1.6;
border: 1px solid #e9edf2;
margin-top: 12px;
font-family: monospace;
}
.search-box {
display: flex;
gap: 8px;
margin: 10px 0;
flex-wrap: wrap;
}
.search-box input {
flex: 1;
padding: 12px 14px;
border: 1px solid #d1d9e6;
border-radius: 40px;
font-size: 15px;
min-width: 100px;
}
.bottom-bar {
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: white;
padding: 12px 16px 20px;
border-top: 1px solid #e2e8f0;
display: flex;
flex-direction: column;
gap: 8px;
}
.bottom-bar .row {
display: flex;
gap: 8px;
flex-wrap: wrap;
justify-content: center;
}
.bottom-bar .row .btn {
flex: 1;
justify-content: center;
min-width: 60px;
text-align: center;
}
.stats {
display: flex;
gap: 12px;
font-size: 14px;
margin-top: 10px;
flex-wrap: wrap;
}
.stats span {
background: #f1f4f9;
padding: 4px 12px;
border-radius: 30px;
}
.label {
font-size: 13px;
color: #64748b;
margin-top: 6px;
}
.flex-row {
display: flex;
gap: 12px;
flex-wrap: wrap;
margin-top: 10px;
}
.flex-row label {
display: flex;
align-items: center;
gap: 6px;
font-size: 14px;
background: #f1f4f9;
padding: 6px 14px;
border-radius: 30px;
}
.highlight {
background: #fef08a;
border-radius: 4px;
}
.marker-start {
background: #bfdbfe;
border-left: 3px solid #2563eb;
}
.marker-end {
background: #fecaca;
border-left: 3px solid #dc2626;
}
.toast {
background: #0f172a;
color: white;
padding: 10px 20px;
border-radius: 40px;
font-size: 14px;
position: fixed;
bottom: 120px;
left: 50%;
transform: translateX(-50%);
opacity: 0;
transition: 0.3s;
pointer-events: none;
z-index: 999;
white-space: nowrap;
}
.toast.show {
opacity: 1;
}
</style>
</head>
<body>

<h1>📄 RP 로그 스플리터</h1>
<p style="color:#64748b;margin-bottom:16px;">🧹 OOC 제거 + 턴 검색 + 범위 추출</p>

<!-- 업로드 -->
<div class="card">
<div class="upload-area" id="uploadArea">
<div style="font-size:18px;margin-bottom:4px;">📂</div>
<div>파일을 선택하세요</div>
<div style="font-size:13px;color:#94a3b8;">TXT / JSON</div>
<input type="file" id="fileInput" accept=".txt,.json" />
</div>
<div id="fileName" style="font-size:14px;color:#475569;margin-top:8px;"></div>

<div class="flex-row">
<label><input type="checkbox" id="cleanOOC" checked /> 🗑️ OOC 제거</label>
<label><input type="checkbox" id="cleanNoise" checked /> 🧹 노이즈 제거</label>
</div>

<div class="stats">
<span>원본: <strong id="origLen">0</strong></span>
<span>정리 후: <strong id="cleanLen">0</strong></span>
<span>제거: <strong id="removedLen">0</strong></span>
</div>

<button class="btn btn-primary" id="applyBtn" style="width:100%;margin-top:12px;">✨ 정리 적용</button>
</div>

<!-- 검색 & 뷰어 -->
<div class="card">
<div class="search-box">
<input type="text" id="searchInput" placeholder="🔍 턴 검색 (예: t30, 40턴)" />
<button class="btn" id="searchPrev">◀</button>
<button class="btn" id="searchNext">▶</button>
</div>
<div id="searchInfo" style="font-size:13px;color:#64748b;">검색 결과: 0개</div>
<div class="viewer" id="viewer">📄 파일을 업로드하면 내용이 표시됩니다.</div>
</div>

<!-- 하단 바 -->
<div class="bottom-bar">
<div class="row">
<button class="btn btn-primary" id="markStart">🔵 시작</button>
<button class="btn btn-danger" id="markEnd">🔴 끝</button>
<button class="btn btn-warning" id="resetMarkers">↺ 초기화</button>
</div>
<div class="row">
<button class="btn btn-success" id="extractBtn" style="flex:2;">✂️ 추출하기</button>
</div>
<div style="font-size:12px;color:#94a3b8;text-align:center;">
시작: <span id="startInfo">없음</span> | 끝: <span id="endInfo">없음</span>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
// === 상태 ===
let rawText = '';
let cleanedText = '';
let displayText = '';
let markers = { start: null, end: null };
let searchResults = [];
let searchIdx = 0;

// === DOM ===
const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const viewer = document.getElementById('viewer');
const fileName = document.getElementById('fileName');
const origLen = document.getElementById('origLen');
const cleanLen = document.getElementById('cleanLen');
const removedLen = document.getElementById('removedLen');
const searchInput = document.getElementById('searchInput');
const searchPrev = document.getElementById('searchPrev');
const searchNext = document.getElementById('searchNext');
const searchInfo = document.getElementById('searchInfo');
const markStart = document.getElementById('markStart');
const markEnd = document.getElementById('markEnd');
const resetMarkers = document.getElementById('resetMarkers');
const extractBtn = document.getElementById('extractBtn');
const applyBtn = document.getElementById('applyBtn');
const cleanOOC = document.getElementById('cleanOOC');
const cleanNoise = document.getElementById('cleanNoise');
const startInfo = document.getElementById('startInfo');
const endInfo = document.getElementById('endInfo');
const toast = document.getElementById('toast');

// === 토스트 ===
function showToast(msg) {
toast.textContent = msg;
toast.classList.add('show');
clearTimeout(toast._hide);
toast._hide = setTimeout(() => toast.classList.remove('show'), 2000);
}

// === 정리 함수 ===
function cleanText(text) {
let t = text;
if (cleanNoise.checked) {
t = t.replace(/https?://[^\s]+/g, '');
t = t.replace(/![.?](.?)/g, '');
t = t.replace(/<img[^>]>/g, '');
t = t.replace(///.latex
/gm, ''); } if (cleanOOC.checked) { t = t.replace(/\*\*OOC:.*?\*\*/g, ''); t = t.replace(/\[[^\]]*\][\s\S]*?(?=\n\[|\n\*\*|

)/g, '');
t = t.replace(//\s*[^/\n](?:/\s[^/\n])/g, '');
t = t.replace(/|[^|\n]/g, '');
t = t.replace(/Call:.$`/gm, '');
}
t = t.replace(/\n{3,}/g, '\n\n');
return t.trim();
}

// === 렌더링 ===
function render(text) {
if (!text) {
viewer.textContent = '📄 내용이 없습니다.';
return;
}
let html = text.replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>');
// 검색 하이라이트
const keyword = searchInput.value.trim();
if (keyword && searchResults.length > 0) {
const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
html = html.replace(regex, match => <span class="highlight"&gt;${match}</span>`);
}
viewer.innerHTML = html;
}

// === 파일 처리 ===
function handleFile(file) {
if (!file) return;
fileName.textContent = 📎 ${file.name} (${(file.size/1024).toFixed(1)} KB);
const reader = new FileReader();
reader.onload = function(e) {
rawText = e.target.result;
applyClean();
showToast('✅ 파일 로드 완료!');
};
reader.onerror = function() {
showToast('❌ 파일 읽기 실패');
};
reader.readAsText(file);
}

function applyClean() {
if (!rawText) {
showToast('⚠️ 파일을 먼저 업로드하세요.');
return;
}
cleanedText = cleanText(rawText);
displayText = cleanedText;
origLen.textContent = rawText.length.toLocaleString();
cleanLen.textContent = cleanedText.length.toLocaleString();
removedLen.textContent = (rawText.length - cleanedText.length).toLocaleString();
render(displayText);
resetMarkers();
searchResults = [];
searchIdx = 0;
searchInfo.textContent = '검색 결과: 0개';
showToast('✅ 정리 완료!');
}

// === 검색 ===
function doSearch() {
const keyword = searchInput.value.trim();
if (!keyword || !displayText) {
searchResults = [];
searchIdx = 0;
searchInfo.textContent = '검색 결과: 0개';
render(displayText);
return;
}
const regex = new RegExp(keyword.replace(/[.*+?^latex
{}()|[\]\\]/g, '\\

&'), 'gi');
const matches = [...displayText.matchAll(regex)];
searchResults = matches.map(m => m.index);
searchIdx = 0;
searchInfo.textContent = 검색 결과: ${searchResults.length}개`;
if (searchResults.length > 0) {
jumpToSearch(0);
} else {
render(displayText);
showToast('🔍 검색 결과가 없습니다.');
}
}

function jumpToSearch(idx) {
if (!searchResults.length) return;
if (idx < 0) idx = 0;
if (idx >= searchResults.length) idx = searchResults.length - 1;
searchIdx = idx;
const pos = searchResults[idx];
const ratio = pos / displayText.length;
viewer.scrollTop = ratio * (viewer.scrollHeight - viewer.clientHeight);
render(displayText);
searchInfo.textContent = 검색 결과:${searchResults.length}개 ({searchResults.length}); showToast(🔍 {searchResults.length} 번째`);
}

// === 마커 ===
function setMarker(type) {
if (!displayText) {
showToast('⚠️ 텍스트가 없습니다.');
return;
}
const ratio = viewer.scrollTop / (viewer.scrollHeight - viewer.clientHeight || 1);
const idx = Math.floor(ratio * displayText.length);
markers[type] = Math.min(Math.max(idx, 0), displayText.length - 1);
startInfo.textContent = markers.start !== null ? 📍 ${markers.start}: '없음'; endInfo.textContent = markers.end !== null ?📍 ${markers.end} : '없음';
render(displayText);
showToast(✅ ${type === 'start' ? '시작' : '끝'} 마커 설정`);
}

function resetMarkers() {
markers = { start: null, end: null };
startInfo.textContent = '없음';
endInfo.textContent = '없음';
render(displayText);
}

// === 추출 ===
function extractRange() {
if (markers.start === null || markers.end === null) {
showToast('⚠️ 시작과 끝 마커를 먼저 설정하세요.');
return;
}
if (!displayText) {
showToast('⚠️ 텍스트가 없습니다.');
return;
}
const s = Math.min(markers.start, markers.end);
const e = Math.max(markers.start, markers.end);
const extracted = displayText.slice(s, e);
if (!extracted.trim()) {
showToast('⚠️ 선택한 범위가 비어있습니다.');
return;
}
const blob = new Blob([extracted], { type: 'text/plain;charset=utf-8' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = extracted_${s}-{(extracted.length/1024).toFixed(1)} KB)`);
}

// === 이벤트 ===
// 파일 업로드
uploadArea.addEventListener('click', function(e) {
if (e.target.tagName !== 'INPUT') {
fileInput.click();
}
});
uploadArea.addEventListener('dragover', function(e) {
e.preventDefault();
uploadArea.style.borderColor = '#3b82f6';
});
uploadArea.addEventListener('dragleave', function(e) {
uploadArea.style.borderColor = '#cbd5e1';
});
uploadArea.addEventListener('drop', function(e) {
e.preventDefault();
uploadArea.style.borderColor = '#cbd5e1';
if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function(e) {
if (e.target.files.length) handleFile(e.target.files[0]);
e.target.value = '';
});

// 버튼
applyBtn.addEventListener('click', applyClean);
searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
searchPrev.addEventListener('click', function() { if (searchResults.length) jumpToSearch(searchIdx - 1); });
searchNext.addEventListener('click', function() { if (searchResults.length) jumpToSearch(searchIdx + 1); });
markStart.addEventListener('click', function() { setMarker('start'); });
markEnd.addEventListener('click', function() { setMarker('end'); });
resetMarkers.addEventListener('click', resetMarkers);
extractBtn.addEventListener('click', extractRange);

// 체크박스
cleanOOC.addEventListener('change', applyClean);
cleanNoise.addEventListener('change', applyClean);

// 초기화
resetMarkers();
origLen.textContent = '0';
cleanLen.textContent = '0';
removedLen.textContent = '0';
showToast('🚀 준비 완료!');

console.log('✅ RP 로그 스플리터 로드됨');
})();
</script>
</body>
</html>
